{% extends "base.html" %}

{% block title %}Edit Book{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header bg-warning">

                <h3>Edit Book</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">
                        <label>Title</label>
                        <input type="text"
                               name="title"
                               value="{{ book.title }}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Author</label>
                        <input type="text"
                               name="author"
                               value="{{ book.author }}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>ISBN</label>
                        <input type="text"
                               name="isbn"
                               value="{{ book.isbn }}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Category</label>
                        <input type="text"
                               name="category"
                               value="{{ book.category }}"
                               class="form-control"
                               required>
                    </div>

                    <div class="mb-3">
                        <label>Quantity</label>
                        <input type="number"
                               name="quantity"
                               value="{{ book.quantity }}"
                               class="form-control"
                               required>
                    </div>

                    <button class="btn btn-warning w-100">
                        Update Book
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
