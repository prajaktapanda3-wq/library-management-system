{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3>Change Password</h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="mb-3">

                        <label>Current Password</label>

                        <input type="password"
                               name="current_password"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label>New Password</label>

                        <input type="password"
                               name="new_password"
                               class="form-control"
                               required>

                    </div>

                    <button class="btn btn-primary w-100">

                        Update Password

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
